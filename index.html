 <!DOCTYPE html>
<html>
<head>
  <title>AI Decision Hub</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    .hero {
      padding: 120px 20px;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
    }

    h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
    }

    button {
      margin-top: 30px;
      padding: 15px 35px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      background: black;
      color: white;
    }

    .section {
      padding: 60px 20px;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Build Real Income With Structured AI Planning</h1>
    <p>No hype. Just clarity, roadmap & execution tracking.</p>
    <button onclick="alert('Growth plan feature coming soon!')">
      Build My Growth Plan
    </button>
  </div>

  <div class="section">
    <h2>How It Works</h2>
    <p>1. Share your details</p>
    <p>2. Get structured roadmap</p>
    <p>3. Track weekly execution</p>
  </div>

</body>
</html>
